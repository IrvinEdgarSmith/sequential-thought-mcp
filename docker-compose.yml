version: '3.8'

services:
  sequential-thought-mcp:
    # IMPORTANT: Replace '<YOUR-GITHUB-USERNAME>' with your actual GitHub username or Docker Hub username
    # Ensure this matches where you push the Docker image
    image: ghcr.io/<YOUR-GITHUB-USERNAME>/sequential-thought-mcp:latest
    container_name: sequential-thought-mcp
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge
